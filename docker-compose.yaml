version: '3.8'
services:
  base:
    image: mars-iot-simulator:multiarch_v1
    container_name: base
    restart: on-failure
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  normalizer:
    build:
      context: ./source/normalizer
    container_name: normalizer
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      API_BASE_URL: http://base:8080
      WS_BASE_URL: ws://base:8080
    restart: on-failure

  rule-engine:
    build:
      context: ./source/rule-engine
    container_name: rule-engine
    ports:
      - '8000:8000'
    depends_on:
      rabbitmq:
        condition: service_healthy
      base:
        condition: service_started
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      ACTUATOR_BASE_URL: http://base:8080/api/actuators
    restart: on-failure
